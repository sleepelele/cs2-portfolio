<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CS2 Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --surface: #181c25;
    --surface2: #1e2330;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #e8eaf0;
    --muted: #7a8099;
    --accent: #e8b84b;
    --accent-dim: rgba(232,184,75,0.12);
    --green: #4caf7d;
    --green-dim: rgba(76,175,125,0.12);
    --red: #e05c5c;
    --red-dim: rgba(224,92,92,0.12);
    --blue: #5b8af0;
    --blue-dim: rgba(91,138,240,0.12);
    --radius: 10px;
    --radius-sm: 6px;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Inter', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; line-height: 1.5; min-height: 100vh; }

  /* Layout */
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; border-bottom: 1px solid var(--border); background: var(--surface); position: sticky; top: 0; z-index: 100; }
  .logo { font-family: var(--mono); font-size: 15px; font-weight: 500; color: var(--accent); letter-spacing: 0.02em; }
  .logo span { color: var(--muted); font-weight: 400; }
  .topbar-actions { display: flex; gap: 8px; align-items: center; }
  .main { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: var(--radius-sm); font-size: 13px; font-family: var(--sans); cursor: pointer; border: 1px solid var(--border2); background: var(--surface2); color: var(--text); transition: background 0.15s, border-color 0.15s; white-space: nowrap; }
  .btn:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.2); }
  .btn:active { transform: scale(0.98); }
  .btn-accent { background: var(--accent); border-color: var(--accent); color: #1a1200; font-weight: 600; }
  .btn-accent:hover { background: #f0c85a; border-color: #f0c85a; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .btn-icon { width: 32px; height: 32px; padding: 0; justify-content: center; }
  .btn svg { width: 15px; height: 15px; }

  /* Metrics */
  .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .metric-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
  .metric-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .metric-value { font-family: var(--mono); font-size: 22px; font-weight: 500; }
  .metric-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .green { color: var(--green); }
  .red { color: var(--red); }
  .accent { color: var(--accent); }

  /* Tabs */
  .tabs { display: flex; gap: 4px; margin-bottom: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 4px; width: fit-content; }
  .tab { padding: 6px 16px; border-radius: 5px; font-size: 13px; cursor: pointer; color: var(--muted); background: transparent; border: none; font-family: var(--sans); transition: background 0.12s, color 0.12s; }
  .tab.active { background: var(--surface2); color: var(--text); }
  .tab:hover:not(.active) { color: var(--text); }

  /* Table */
  .table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: var(--radius); }
  table { width: 100%; border-collapse: collapse; min-width: 700px; }
  thead th { background: var(--surface); padding: 10px 14px; font-size: 11px; font-weight: 500; color: var(--muted); text-align: left; text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; white-space: nowrap; }
  thead th:hover { color: var(--text); }
  thead th .sort-icon { opacity: 0.4; margin-left: 4px; }
  thead th.sorted .sort-icon { opacity: 1; color: var(--accent); }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(255,255,255,0.025); }
  tbody td { padding: 10px 14px; vertical-align: middle; }
  .item-name { font-weight: 500; color: var(--text); }
  .item-name small { display: block; font-size: 11px; color: var(--muted); font-weight: 400; margin-top: 1px; }
  .mono { font-family: var(--mono); font-size: 13px; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-family: var(--mono); font-weight: 500; }
  .badge-green { background: var(--green-dim); color: var(--green); }
  .badge-red { background: var(--red-dim); color: var(--red); }
  .badge-muted { background: rgba(255,255,255,0.05); color: var(--muted); }
  .price-cell { display: flex; align-items: center; gap: 6px; }
  .price-input { background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius-sm); color: var(--text); font-family: var(--mono); font-size: 13px; padding: 4px 8px; width: 80px; text-align: right; }
  .price-input:focus { outline: none; border-color: var(--accent); }
  .price-input:focus-visible { box-shadow: 0 0 0 2px var(--accent-dim); }
  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); display: inline-block; animation: pulse 2s infinite; }
  .live-dot.stale { background: var(--muted); animation: none; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .fetch-btn { padding: 2px 7px; font-size: 11px; }

  /* Charts */
  .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media(max-width:720px){ .charts-grid { grid-template-columns: 1fr; } }
  .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
  .chart-title { font-size: 12px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 16px; }
  .chart-wrap { position: relative; width: 100%; }
  .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
  .legend-dot { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }

  /* Add/Edit modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.hidden { display: none; }
  .modal { background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius); padding: 24px; width: 100%; max-width: 440px; }
  .modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 20px; }
  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em; }
  .form-input { width: 100%; background: var(--bg); border: 1px solid var(--border2); border-radius: var(--radius-sm); color: var(--text); font-family: var(--sans); font-size: 14px; padding: 9px 12px; }
  .form-input:focus { outline: none; border-color: var(--accent); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-hint { font-size: 11px; color: var(--muted); margin-top: 5px; }
  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

  /* Filter bar */
  .filter-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .filter-bar input[type=text] { background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius-sm); color: var(--text); padding: 7px 12px; font-size: 13px; font-family: var(--sans); width: 200px; }
  .filter-bar input:focus { outline: none; border-color: var(--accent); }
  .filter-select { background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius-sm); color: var(--text); padding: 7px 10px; font-size: 13px; font-family: var(--sans); }
  .filter-select:focus { outline: none; border-color: var(--accent); }
  .toggle-fee { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); cursor: pointer; margin-left: auto; }
  .toggle-fee input { accent-color: var(--accent); }

  /* Status bar */
  .status-bar { display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--muted); margin-bottom: 16px; }

  /* Toast */
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 10px 16px; font-size: 13px; z-index: 999; opacity: 0; transform: translateY(8px); transition: opacity 0.2s, transform 0.2s; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* Empty state */
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty h3 { font-size: 16px; margin-bottom: 8px; color: var(--text); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .delete-btn { opacity: 0; transition: opacity 0.1s; background: none; border: none; color: var(--red); cursor: pointer; padding: 2px 5px; border-radius: 4px; }
  tr:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { background: var(--red-dim); }
  .type-badge { font-size: 10px; padding: 1px 6px; border-radius: 3px; background: var(--blue-dim); color: var(--blue); font-family: var(--mono); margin-left: 6px; vertical-align: middle; }
  .search-item { display:flex; align-items:center; gap:10px; padding:8px 12px; cursor:pointer; font-size:13px; color:var(--text); border-bottom:1px solid var(--border); }
  .search-item:last-child { border-bottom:none; }
  .search-item:hover, .search-item.selected { background:rgba(255,255,255,0.06); }
  .search-item img { width:32px; height:32px; object-fit:contain; border-radius:3px; flex-shrink:0; }
  .search-item-name { flex:1; }
  .search-item-price { font-family:var(--mono); font-size:12px; color:var(--muted); }
  .search-loading { padding:12px; text-align:center; color:var(--muted); font-size:12px; }

</style>
</head>
<body>

<div class="topbar">
  <div class="logo">cs2<span>/</span>portfolio</div>
  <div class="topbar-actions">
    <span id="last-updated" style="font-size:11px;color:var(--muted)"></span>
    <button class="btn" id="reset-btn" onclick="resetData()" title="Reset to defaults" style="color:var(--muted)">Reset data</button>
    <button class="btn" id="refresh-all-btn" onclick="refreshAllPrices()" title="Fetch all Steam prices">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      Refresh prices
    </button>
    <button class="btn btn-accent" onclick="openAddModal()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add item
    </button>
  </div>
</div>

<div class="main">
  <div class="metrics-grid" id="metrics-grid"></div>

  <div class="tabs">
    <button class="tab active" onclick="setTab('holdings')">Holdings</button>
    <button class="tab" onclick="setTab('charts')">Charts</button>
  </div>

  <div id="tab-holdings" class="tab-content active">
    <div class="filter-bar">
      <input type="text" id="search-input" placeholder="Search items…" oninput="render()" />
      <select class="filter-select" id="filter-roi" onchange="render()">
        <option value="all">All ROI</option>
        <option value="positive">Positive only</option>
        <option value="negative">Negative only</option>
      </select>
      <select class="filter-select" id="filter-type" onchange="render()">
        <option value="all">All types</option>
        <option value="Case">Cases</option>
        <option value="Skin">Skins</option>
        <option value="Other">Other</option>
      </select>
      <label class="toggle-fee">
        <input type="checkbox" id="fee-toggle" checked onchange="render()" />
        Subtract Steam 15% fee
      </label>
    </div>
    <div class="status-bar" id="status-bar"></div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th onclick="sortBy('name')">Item <span class="sort-icon">↕</span></th>
            <th onclick="sortBy('qty')">Qty <span class="sort-icon">↕</span></th>
            <th onclick="sortBy('buyPrice')">Buy price <span class="sort-icon">↕</span></th>
            <th onclick="sortBy('invested')">Invested <span class="sort-icon">↕</span></th>
            <th>Steam price</th>
            <th onclick="sortBy('marketValue')">Value <span class="sort-icon">↕</span></th>
            <th onclick="sortBy('roi')">ROI <span class="sort-icon">↕</span></th>
            <th onclick="sortBy('profitLoss')">P/L <span class="sort-icon">↕</span></th>
            <th></th>
          </tr>
        </thead>
        <tbody id="holdings-body"></tbody>
      </table>
    </div>
  </div>

  <div id="tab-charts" class="tab-content">
    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-title">ROI per item (%)</div>
        <div class="chart-wrap" style="height:300px"><canvas id="roi-chart" role="img" aria-label="ROI per item bar chart">ROI per item</canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Capital allocation</div>
        <div class="chart-wrap" style="height:260px"><canvas id="alloc-chart" role="img" aria-label="Capital allocation donut chart">Capital allocation</canvas></div>
        <div class="legend" id="alloc-legend"></div>
      </div>
      <div class="chart-card" style="grid-column: 1 / -1;">
        <div class="chart-title">Market value vs invested — per item</div>
        <div class="chart-wrap" style="height:280px"><canvas id="compare-chart" role="img" aria-label="Grouped bar chart comparing invested vs market value per item">Invested vs value</canvas></div>
      </div>
    </div>
  </div>
</div>

<!-- Add/Edit modal -->
<div class="modal-overlay hidden" id="modal-overlay" onclick="closeModalOnBg(event)">
  <div class="modal">
    <h3 id="modal-title">Add item</h3>
    <div class="form-group" style="position:relative">
      <label class="form-label">Item name</label>
      <input class="form-input" id="modal-name" type="text" placeholder="Start typing to search Steam market…" autocomplete="off" oninput="searchSteamItems(this.value)" onkeydown="handleSearchKey(event)" />
      <div id="search-dropdown" style="display:none;position:absolute;left:0;right:0;top:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);z-index:300;max-height:260px;overflow-y:auto;margin-top:2px;"></div>
      <div class="form-hint" id="search-hint">Start typing — results appear from Steam market</div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Type</label>
        <select class="form-input" id="modal-type">
          <option value="Case">Case</option>
          <option value="Skin">Skin</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Quantity</label>
        <input class="form-input" id="modal-qty" type="number" min="1" value="1" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Buy price (€ per unit)</label>
        <input class="form-input" id="modal-buy" type="number" min="0" step="0.01" placeholder="0.00" />
      </div>
      <div class="form-group">
        <label class="form-label">Market price (€)</label>
        <input class="form-input" id="modal-market" type="number" min="0" step="0.01" placeholder="auto-fetch" />
        <div class="form-hint">Leave blank to fetch from Steam</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-accent" id="modal-save-btn" onclick="saveItem()">Add item</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── Config ──────────────────────────────────────────────────────────────────
// Point this to your Render proxy URL
const PROXY_URL = 'https://cs2-price-proxy.onrender.com';
const STEAM_FEE = 0.85;
const LS_KEY = 'cs2_portfolio_v2';

// ─── Item image helper (uses Steam market icon via name) ──────────────────────
// Images are fetched from the Steam market listing page icon
const ITEM_IMAGES = {
  'Fever Case':                    'https://steamcommunity-a.akamaihd.net/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXU5A1PIYQNqhpOSV-fRPasw8rsUFJ5KBFZv668FFYjwfCCekJT08yOgZKOkb_mZuLTxlRcsJ0piLuSp9_HmGz5vJqBVB-ZDoMdqRfbL5mWQ/75fx75f',
  'Revolution Case':               'https://steamcommunity-a.akamaihd.net/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXU5A1PIYQNqhpOSV-fRPasw8rsUFJ5KBFZv668FFYjwfCCekJT08yOgZKOkb_mZuLTxlRcsJ0piLuT9YjnFLtrUMNmPsMqhZ2D7I4-Tdl9FmN5mWQ/75fx75f',
  'Prisma Case':                   'https://steamcommunity-a.akamaihd.net/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXU5A1PIYQNqhpOSV-fRPasw8rsUFJ5KBFZv668FFYg0fCCekJT08yOgZKOkb_mZuLTxlRcsJ0piLuSp0u3VvkrUJsYzqPIoKPdVFDvY15vWqQ/75fx75f',
  'Fracture Case':                 'https://steamcommunity-a.akamaihd.net/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXU5A1PIYQNqhpOSV-fRPasw8rsUFJ5KBFZv668FFYg0fCCekJT08yOgZKOkb_mZuLTxlRcsJ0piLuSp9r3FPmrEJsYzrPIoKPdVHDvY15vWqQ/75fx75f',
  'Kilowatt Case':                 'https://steamcommunity-a.akamaihd.net/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXU5A1PIYQNqhpOSV-fRPasw8rsUFJ5KBFZv668FFYjwfCCekJT08yOgZKOkb_mZuLTxlRcsJ0piLuSp9bnlW-ukI9Y2uIoKPdVFzuY15vWqQ/75fx75f',
  'Operation Phoenix Weapon Case': 'https://steamcommunity-a.akamaihd.net/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXU5A1PIYQNqhpOSV-fRPasw8rsUFJ5KBFZv668FFYg0fCCekJT08yOgZKOkb_mZuLTxlRcsJ0piLuT9Ri3lPkqEthZ2D7I4-TdkRmN5mWQ/75fx75f',
  'Operation Breakout Weapon Case':'https://steamcommunity-a.akamaihd.net/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXU5A1PIYQNqhpOSV-fRPasw8rsUFJ5KBFZv668FFYg0fCCekJT08yOgZKOkb_mZuLTxlRcsJ0piLuT9Mm3lak-EM-Z2H7I4-TdlFmN5mWQ/75fx75f',
  'Spectrum Case':                 'https://steamcommunity-a.akamaihd.net/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXU5A1PIYQNqhpOSV-fRPasw8rsUFJ5KBFZv668FFYg0fCCekJT08yOgZKOkb_mZuLTxlRcsJ0piLuT8di3lGk-UJpZW3I4-TdkNmN5mWQ/75fx75f',
  'Chroma 3 Case':                 'https://steamcommunity-a.akamaihd.net/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXU5A1PIYQNqhpOSV-fRPasw8rsUFJ5KBFZv668FFYg0fCCekJT08yOgZKOkb_mZuLTxlRcsJ0piLuSoQ-3VetrURuZmH7I4-TdkRmN5mWQ/75fx75f',
};
// For unknown items, fall back to Steam market icon API
function getItemImg(name, icon) {
  if (icon) return icon;
  return ITEM_IMAGES[name] || null;
}

// ─── Correct CS2 item names (exact Steam market names) ───────────────────────
const NAME_CORRECTIONS = {
  'fever case': 'Fever Case',
  'revolution case': 'Revolution Case',
  'prism case': 'Prisma Case',
  'fracture case': 'Fracture Case',
  'kilowatt case': 'Kilowatt Case',
  'phoenix case': 'Operation Phoenix Weapon Case',
  'operation phoenix case': 'Operation Phoenix Weapon Case',
  'operation phoenix weapon case': 'Operation Phoenix Weapon Case',
  'operation breakout case': 'Operation Breakout Weapon Case',
  'breakout case': 'Operation Breakout Weapon Case',
  'spectrum case': 'Spectrum Case',
  'chroma 3 case': 'Chroma 3 Case',
  'chroma3 case': 'Chroma 3 Case',
};

function correctName(raw) {
  const lower = raw.trim().toLowerCase();
  return NAME_CORRECTIONS[lower] || raw.trim();
}

// ─── State ────────────────────────────────────────────────────────────────────
let items = [];
let sortKey = 'invested';
let sortDir = -1;
let editIdx = null;
let roiChartInst = null, allocChartInst = null, compareChartInst = null;

const PALETTE = ['#e8b84b','#5b8af0','#4caf7d','#e05c5c','#c08ef0','#f07878','#50c8e0','#a0e070','#f0a050','#7090d0'];

// ─── Persistence ──────────────────────────────────────────────────────────────
function save() { localStorage.setItem(LS_KEY, JSON.stringify(items)); }
function load() {
  try { items = JSON.parse(localStorage.getItem(LS_KEY)) || defaultItems(); }
  catch { items = defaultItems(); }
}
function defaultItems() {
  return [
    { id: uid(), name: 'Fever Case',                     type: 'Case', qty: 3,   buyPrice: 0.50, marketPrice: 0.50, priceTs: null, img: 'fevercase' },
    { id: uid(), name: 'Revolution Case',                type: 'Case', qty: 100, buyPrice: 0.25, marketPrice: 0.25, priceTs: null, img: 'revolutioncase' },
    { id: uid(), name: 'Prisma Case',                    type: 'Case', qty: 30,  buyPrice: 1.21, marketPrice: 1.21, priceTs: null, img: 'prismacase' },
    { id: uid(), name: 'Fracture Case',                  type: 'Case', qty: 50,  buyPrice: 0.47, marketPrice: 0.47, priceTs: null, img: 'fracturecase' },
    { id: uid(), name: 'Kilowatt Case',                  type: 'Case', qty: 100, buyPrice: 0.19, marketPrice: 0.19, priceTs: null, img: 'kilowattcase' },
    { id: uid(), name: 'Operation Phoenix Weapon Case',  type: 'Case', qty: 25,  buyPrice: 3.23, marketPrice: 3.23, priceTs: null, img: 'ophoenixcase' },
    { id: uid(), name: 'Operation Breakout Weapon Case', type: 'Case', qty: 20,  buyPrice: 6.36, marketPrice: 6.36, priceTs: null, img: 'opbreakoutcase' },
    { id: uid(), name: 'Spectrum Case',                  type: 'Case', qty: 7,   buyPrice: 3.22, marketPrice: 3.22, priceTs: null, img: 'spectrumcase' },
    { id: uid(), name: 'Chroma 3 Case',                  type: 'Case', qty: 3,   buyPrice: 3.12, marketPrice: 3.12, priceTs: null, img: 'chroma3case' },
  ];
}
function uid() { return Math.random().toString(36).slice(2, 9); }

// ─── Calc ──────────────────────────────────────────────────────────────────────
function calcRow(item, withFee) {
  const invested = item.qty * item.buyPrice;
  const rawValue = item.qty * item.marketPrice;
  const marketValue = withFee ? rawValue * STEAM_FEE : rawValue;
  const profitLoss = marketValue - invested;
  const roi = invested > 0 ? (profitLoss / invested) * 100 : 0;
  return { ...item, invested, marketValue, profitLoss, roi };
}

// ─── Format ───────────────────────────────────────────────────────────────────
function fmtEur(v) { return '€' + Math.abs(v).toFixed(2); }
function fmtRoi(v) { return (v >= 0 ? '+' : '-') + Math.abs(v).toFixed(1) + '%'; }
function fmtPL(v) { return (v >= 0 ? '+' : '-') + '€' + Math.abs(v).toFixed(2); }
function fmtAge(ts) {
  if (!ts) return 'manual';
  const mins = Math.round((Date.now() - ts) / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  return Math.round(mins / 60) + 'h ago';
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  const withFee = document.getElementById('fee-toggle').checked;
  const q = document.getElementById('search-input').value.toLowerCase();
  const roiFilter = document.getElementById('filter-roi').value;
  const typeFilter = document.getElementById('filter-type').value;

  let rows = items.map(item => calcRow(item, withFee));

  if (q) rows = rows.filter(r => r.name.toLowerCase().includes(q));
  if (roiFilter === 'positive') rows = rows.filter(r => r.roi >= 0);
  if (roiFilter === 'negative') rows = rows.filter(r => r.roi < 0);
  if (typeFilter !== 'all') rows = rows.filter(r => r.type === typeFilter);

  if (sortKey) {
    rows.sort((a, b) => sortDir * (
      typeof a[sortKey] === 'string' ? a[sortKey].localeCompare(b[sortKey]) : a[sortKey] - b[sortKey]
    ));
  }

  // Metrics
  const allRows = items.map(item => calcRow(item, withFee));
  const totalInvested = allRows.reduce((s, r) => s + r.invested, 0);
  const totalValue = allRows.reduce((s, r) => s + r.marketValue, 0);
  const totalPL = totalValue - totalInvested;
  const totalRoi = totalInvested > 0 ? (totalPL / totalInvested) * 100 : 0;
  const totalQty = allRows.reduce((s, r) => s + r.qty, 0);
  const winners = allRows.filter(r => r.roi >= 0).length;

  const mg = document.getElementById('metrics-grid');
  mg.innerHTML = `
    <div class="metric-card"><div class="metric-label">Invested</div><div class="metric-value mono">${fmtEur(totalInvested)}</div></div>
    <div class="metric-card"><div class="metric-label">Market value</div><div class="metric-value mono">${fmtEur(totalValue)}</div><div class="metric-sub">${withFee ? 'after Steam fee' : 'before fee'}</div></div>
    <div class="metric-card"><div class="metric-label">Total P/L</div><div class="metric-value mono ${totalPL >= 0 ? 'green' : 'red'}">${fmtPL(totalPL)}</div></div>
    <div class="metric-card"><div class="metric-label">Portfolio ROI</div><div class="metric-value mono ${totalRoi >= 0 ? 'green' : 'red'}">${fmtRoi(totalRoi)}</div></div>
    <div class="metric-card"><div class="metric-label">Total items</div><div class="metric-value mono">${totalQty}</div><div class="metric-sub">${items.length} unique</div></div>
    <div class="metric-card"><div class="metric-label">Winners</div><div class="metric-value mono accent">${winners}<span style="font-size:14px;color:var(--muted)">/${items.length}</span></div></div>
  `;

  // Table
  const tbody = document.getElementById('holdings-body');
  if (rows.length === 0) {
    tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--muted)">No items match your filters</td></tr>';
  } else {
    tbody.innerHTML = rows.map(r => {
      const origIdx = items.findIndex(i => i.id === r.id);
      const stale = !r.priceTs;
      const typeLabel = r.type !== 'Case' ? `<span class="type-badge">${r.type}</span>` : '';
      const imgUrl = getItemImg(r.name, r.icon);
      const imgHtml = imgUrl ? `<img src="${imgUrl}" width="32" height="32" style="border-radius:4px;margin-right:8px;vertical-align:middle;object-fit:contain" onerror="this.style.display='none'" />` : '';
      return `<tr>
        <td class="item-name" style="display:flex;align-items:center">${imgHtml}<div>${r.name}${typeLabel}<small>${r.type} · ${fmtAge(r.priceTs)}</small></div></td>
        <td class="mono">${r.qty}</td>
        <td><input class="price-input" type="number" step="0.01" min="0" value="${r.buyPrice.toFixed(2)}" onchange="updateBuyPrice(${origIdx}, this.value)" title="Your purchase price per unit" /></td>
        <td class="mono">${fmtEur(r.invested)}</td>
        <td>
          <div class="price-cell">
            <span class="${stale ? 'live-dot stale' : 'live-dot'}" title="${stale ? 'Manual price' : 'Fetched from Steam'}"></span>
            <input class="price-input" type="number" step="0.01" min="0" value="${r.marketPrice.toFixed(2)}"
              onchange="updatePrice(${origIdx}, this.value)" />
            <button class="btn btn-sm fetch-btn" onclick="fetchOne(${origIdx})" title="Fetch from Steam">↻</button>
          </div>
        </td>
        <td class="mono">${fmtEur(r.marketValue)}</td>
        <td><span class="badge ${r.roi >= 0 ? 'badge-green' : 'badge-red'}">${fmtRoi(r.roi)}</span></td>
        <td class="mono ${r.profitLoss >= 0 ? 'green' : 'red'}" style="font-weight:500">${fmtPL(r.profitLoss)}</td>
        <td>
          <button class="delete-btn" onclick="deleteItem(${origIdx})" title="Delete">✕</button>
        </td>
      </tr>`;
    }).join('');
  }

  // Status bar
  const hasAnyPrice = items.some(i => i.priceTs);
  const lastTs = hasAnyPrice ? Math.max(...items.filter(i => i.priceTs).map(i => i.priceTs)) : null;
  document.getElementById('status-bar').innerHTML = lastTs
    ? `<span class="live-dot"></span> Prices last refreshed ${fmtAge(lastTs)} · <span style="color:var(--muted)">manual edits override fetched price</span>`
    : `<span class="live-dot stale"></span> No live prices yet — hit "Refresh prices" to fetch from Steam`;

  updateLastUpdated();
}

function updateLastUpdated() {
  const el = document.getElementById('last-updated');
  const hasTs = items.some(i => i.priceTs);
  if (hasTs) {
    const ts = Math.max(...items.filter(i => i.priceTs).map(i => i.priceTs));
    el.textContent = 'Updated ' + fmtAge(ts);
  } else {
    el.textContent = '';
  }
}

// ─── Sort ──────────────────────────────────────────────────────────────────────
function sortBy(key) {
  if (sortKey === key) sortDir *= -1;
  else { sortKey = key; sortDir = 1; }
  document.querySelectorAll('thead th').forEach(th => th.classList.remove('sorted'));
  event.currentTarget.classList.add('sorted');
  render();
}

// ─── Price updates ────────────────────────────────────────────────────────────
function updateBuyPrice(idx, val) {
  items[idx].buyPrice = parseFloat(val) || 0;
  save();
  render();
}

function updatePrice(idx, val) {
  items[idx].marketPrice = parseFloat(val) || 0;
  items[idx].priceTs = null; // mark as manual
  save();
  render();
}

async function fetchOne(idx) {
  const item = items[idx];
  toast(`Fetching ${item.name}…`);
  try {
    const res = await fetch(`${PROXY_URL}/price?name=${encodeURIComponent(item.name)}`);
    const data = await res.json();
    if (data.lowest_price != null) {
      items[idx].marketPrice = data.lowest_price;
      items[idx].priceTs = Date.now();
      if (data.icon && !items[idx].icon) items[idx].icon = data.icon;
      save();
      render();
      toast(`${item.name}: €${data.lowest_price.toFixed(2)}`);
    } else {
      toast('Not found on Steam market', true);
    }
  } catch (e) {
    toast('Could not reach price proxy', true);
  }
}

async function refreshAllPrices() {
  const btn = document.getElementById('refresh-all-btn');
  btn.disabled = true;
  const secs = Math.round(items.length * 1.2);
  toast(`Fetching ${items.length} prices (~${secs}s)…`);
  btn.textContent = 'Fetching prices…';

  // Step 1: fetch prices
  try {
    const res = await fetch(`${PROXY_URL}/prices`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ names: [...new Set(items.map(i => i.name))] }) // dedupe names
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    let updated = 0;
    items.forEach(item => {
      const r = data[item.name];
      if (r && r.lowest_price != null) {
        item.marketPrice = r.lowest_price;
        item.priceTs = Date.now();
        updated++;
      } else if (r && r.error) {
        console.warn(`${item.name}: ${r.error}`);
      }
    });
    save();
    render();
    renderCharts();
    toast(`✓ Updated ${updated}/${items.length} prices`);
  } catch (e) {
    toast('Could not reach proxy — is Render awake? Try again in 30s', true);
    btn.disabled = false;
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> Refresh prices`;
    return;
  }

  // Step 2: fetch icons for items that don't have one yet
  const missing = [...new Set(items.filter(i => !i.icon).map(i => i.name))];
  if (missing.length) {
    btn.textContent = 'Fetching icons…';
    try {
      const res = await fetch(`${PROXY_URL}/icons`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ names: missing })
      });
      const icons = await res.json();
      items.forEach(item => {
        if (!item.icon && icons[item.name]) item.icon = icons[item.name];
      });
      save();
      render();
    } catch {}
  }

  btn.disabled = false;
  btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> Refresh prices`;
}

// ─── CRUD ──────────────────────────────────────────────────────────────────────
function openAddModal() {
  editIdx = null;
  pendingIcon = null;
  document.getElementById('modal-title').textContent = 'Add item';
  document.getElementById('modal-save-btn').textContent = 'Add item';
  document.getElementById('modal-name').value = '';
  document.getElementById('modal-qty').value = 1;
  document.getElementById('modal-buy').value = '';
  document.getElementById('modal-market').value = '';
  document.getElementById('modal-type').value = 'Case';
  document.getElementById('search-hint').textContent = 'Start typing — results appear from Steam market';
  document.getElementById('search-dropdown').style.display = 'none';
  document.getElementById('modal-overlay').classList.remove('hidden');
  document.getElementById('modal-name').focus();
}

function closeModal() { document.getElementById('modal-overlay').classList.add('hidden'); }
function closeModalOnBg(e) { if (e.target.id === 'modal-overlay') closeModal(); }

function saveItem() {
  const rawName = document.getElementById('modal-name').value.trim();
  if (!rawName) { toast('Item name required', true); return; }
  const name = correctName(rawName);
  const qty = parseInt(document.getElementById('modal-qty').value) || 1;
  const buyPrice = parseFloat(document.getElementById('modal-buy').value) || 0;
  const marketRaw = document.getElementById('modal-market').value;
  const marketPrice = marketRaw ? parseFloat(marketRaw) : buyPrice;
  const type = document.getElementById('modal-type').value;

  if (editIdx !== null) {
    items[editIdx] = { ...items[editIdx], name, qty, buyPrice, marketPrice, type };
  } else {
    // Always add as new row — allows tracking same item at different buy prices
    items.push({ id: uid(), name, type, qty, buyPrice, marketPrice, priceTs: null, icon: pendingIcon });
  }
  save();
  render();
  closeModal();
  if (name !== rawName) toast(`Name corrected to "${name}"`);
  // Auto-fetch if market price not set
  if (!marketRaw) {
    const newIdx = items.length - 1;
    setTimeout(() => fetchOne(newIdx), 300);
  }
}

function deleteItem(idx) {
  if (!confirm(`Remove ${items[idx].name}?`)) return;
  items.splice(idx, 1);
  save();
  render();
  renderCharts();
}

// ─── Tabs ──────────────────────────────────────────────────────────────────────
function setTab(tab) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  event.currentTarget.classList.add('active');
  if (tab === 'charts') renderCharts();
}

// ─── Charts ───────────────────────────────────────────────────────────────────
function renderCharts() {
  const withFee = document.getElementById('fee-toggle').checked;
  const rows = items.map(i => calcRow(i, withFee));
  const labels = rows.map(r => r.name.replace(/ Case$/, '').replace('Operation ', 'Op.'));
  const rois = rows.map(r => parseFloat(r.roi.toFixed(1)));
  const invested = rows.map(r => parseFloat(r.invested.toFixed(2)));
  const values = rows.map(r => parseFloat(r.marketValue.toFixed(2)));

  const gridColor = 'rgba(255,255,255,0.06)';
  const tickColor = '#7a8099';

  // ROI chart
  if (roiChartInst) roiChartInst.destroy();
  roiChartInst = new Chart(document.getElementById('roi-chart').getContext('2d'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: 'ROI %',
        data: rois,
        backgroundColor: rois.map(v => v >= 0 ? 'rgba(76,175,125,0.7)' : 'rgba(224,92,92,0.7)'),
        borderRadius: 4,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: tickColor, font: { size: 11 }, autoSkip: false, maxRotation: 40 }, grid: { display: false } },
        y: { ticks: { color: tickColor, callback: v => v + '%', font: { size: 11 } }, grid: { color: gridColor } }
      }
    }
  });

  // Alloc donut
  if (allocChartInst) allocChartInst.destroy();
  allocChartInst = new Chart(document.getElementById('alloc-chart').getContext('2d'), {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{ data: invested, backgroundColor: PALETTE, borderWidth: 1, borderColor: '#181c25' }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      cutout: '65%',
    }
  });

  const total = invested.reduce((s, v) => s + v, 0);
  document.getElementById('alloc-legend').innerHTML = labels.map((l, i) =>
    `<div class="legend-item"><div class="legend-dot" style="background:${PALETTE[i % PALETTE.length]}"></div>${l} (${((invested[i] / total) * 100).toFixed(1)}%)</div>`
  ).join('');

  // Compare chart
  if (compareChartInst) compareChartInst.destroy();
  compareChartInst = new Chart(document.getElementById('compare-chart').getContext('2d'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'Invested', data: invested, backgroundColor: 'rgba(91,138,240,0.6)', borderRadius: 3 },
        { label: 'Market value', data: values, backgroundColor: 'rgba(232,184,75,0.6)', borderRadius: 3 },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: tickColor, font: { size: 11 }, autoSkip: false, maxRotation: 40 }, grid: { display: false } },
        y: { ticks: { color: tickColor, callback: v => '€' + v, font: { size: 11 } }, grid: { color: gridColor } }
      }
    }
  });

  // Custom legend for compare chart
  // (appended below the chart card, no need to add separately since items are self-explanatory)
}

// ─── Toast ────────────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg, isErr) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.borderColor = isErr ? 'rgba(224,92,92,0.4)' : 'rgba(255,255,255,0.13)';
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}


// ─── Steam search autocomplete ────────────────────────────────────────────────
let searchTimer = null;
let searchResults = [];
let selectedIdx = -1;

function searchSteamItems(q) {
  const dropdown = document.getElementById('search-dropdown');
  const hint = document.getElementById('search-hint');
  clearTimeout(searchTimer);
  selectedIdx = -1;

  if (q.length < 2) {
    dropdown.style.display = 'none';
    hint.textContent = 'Start typing — results appear from Steam market';
    return;
  }

  hint.textContent = 'Searching…';
  dropdown.style.display = 'block';
  dropdown.innerHTML = '<div class="search-loading">Searching Steam market…</div>';

  searchTimer = setTimeout(async () => {
    try {
      const res = await fetch(`${PROXY_URL}/search?q=${encodeURIComponent(q)}`);
      searchResults = await res.json();
      renderDropdown();
      hint.textContent = searchResults.length ? `${searchResults.length} results — click to select` : 'No results found';
    } catch {
      dropdown.innerHTML = '<div class="search-loading">Could not reach proxy</div>';
      hint.textContent = 'Search unavailable — type name manually';
    }
  }, 350);
}

function renderDropdown() {
  const dropdown = document.getElementById('search-dropdown');
  if (!searchResults.length) {
    dropdown.innerHTML = '<div class="search-loading">No results</div>';
    return;
  }
  dropdown.innerHTML = searchResults.map((item, i) => `
    <div class="search-item${i === selectedIdx ? ' selected' : ''}" onclick="selectSearchItem(${i})">
      ${item.icon ? `<img src="${item.icon}" onerror="this.style.display='none'" />` : '<div style="width:32px;height:32px;background:var(--surface);border-radius:3px;flex-shrink:0"></div>'}
      <span class="search-item-name">${item.name}</span>
      ${item.lowest_price ? `<span class="search-item-price">${item.lowest_price}</span>` : ''}
    </div>
  `).join('');
}

let pendingIcon = null; // icon URL from search selection

function selectSearchItem(i) {
  const item = searchResults[i];
  document.getElementById('modal-name').value = item.name;
  document.getElementById('search-dropdown').style.display = 'none';
  document.getElementById('search-hint').textContent = '✓ Selected from Steam market';
  pendingIcon = item.icon || null;
  // Auto-detect type
  const n = item.name.toLowerCase();
  if (n.includes('case') || n.includes('capsule') || n.includes('package')) {
    document.getElementById('modal-type').value = 'Case';
  } else if (n.includes('sticker') || n.includes('patch') || n.includes('graffiti') || n.includes('pin') || n.includes('charm')) {
    document.getElementById('modal-type').value = 'Other';
  } else {
    document.getElementById('modal-type').value = 'Skin';
  }
  document.getElementById('modal-buy').focus();
}

function handleSearchKey(e) {
  const dropdown = document.getElementById('search-dropdown');
  if (dropdown.style.display === 'none' || !searchResults.length) return;
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    selectedIdx = Math.min(selectedIdx + 1, searchResults.length - 1);
    renderDropdown();
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    selectedIdx = Math.max(selectedIdx - 1, 0);
    renderDropdown();
  } else if (e.key === 'Enter' && selectedIdx >= 0) {
    e.preventDefault();
    selectSearchItem(selectedIdx);
  } else if (e.key === 'Escape') {
    dropdown.style.display = 'none';
  }
}

// Close dropdown when clicking outside
document.addEventListener('click', e => {
  if (!e.target.closest('#modal-overlay')) return;
  if (!e.target.closest('.form-group')) {
    document.getElementById('search-dropdown').style.display = 'none';
  }
});

// ─── Init ──────────────────────────────────────────────────────────────────────
function resetData() {
  if (!confirm('Reset all data to defaults? This will clear any items you added or edited.')) return;
  localStorage.removeItem(LS_KEY);
  items = defaultItems();
  save();
  render();
  toast('Data reset to defaults');
}

load();
render();
</script>
